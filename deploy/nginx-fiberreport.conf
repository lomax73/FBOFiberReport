server {
    listen 80;
    server_name fiberreport.tuodominio.it;

    client_max_body_size 10M;

    location /static/ {
        alias /opt/fiberreport/app/staticfiles/;
    }

    location /media/ {
        alias /opt/fiberreport/app/media/;
    }

    location / {
        proxy_pass http://unix:/run/fiberreport/gunicorn.sock;
        # $http_host (non $host): include la porta se non standard, altrimenti
        # il controllo CSRF di Django fallisce per mismatch Host/Referer.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
