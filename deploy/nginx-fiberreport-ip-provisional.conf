# Config REALMENTE in uso in produzione finché non esiste un dominio:
# MKRemote è su 94.177.161.127:443, il Portale su :8443 (self-signed),
# questa app usa la porta 8444 sullo stesso IP.
# Da sostituire con nginx-fiberreport.conf (dominio + Let's Encrypt) appena
# disponibile un dominio reale — vedi deploy/README.md.
server {
    listen 8444 ssl;
    server_name 94.177.161.127;

    ssl_certificate     /etc/ssl/fiberreport/selfsigned.crt;
    ssl_certificate_key /etc/ssl/fiberreport/selfsigned.key;

    client_max_body_size 10M;

    location /static/ {
        alias /opt/fiberreport/app/staticfiles/;
    }

    location /media/ {
        alias /opt/fiberreport/app/media/;
    }

    location / {
        proxy_pass http://unix:/run/fiberreport/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
